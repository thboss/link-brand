        <button class="btn btn-p" id="ocopy" style="padding: 0.6rem 1rem; font-size: 0.85rem; flex-shrink: 0;">${t('copyLink')}</button>
    </div>
    
    <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;">
        <div style="font-size: 0.85rem; color: var(--text-muted);">${getLang() === 'ar' ? 'قم بزيارة صفحتك:' : 'Visit your page:'}</div>
        <a href="${pUrl}" target="_blank" style="color: var(--primary); font-weight: 600; font-size: 0.9rem; text-decoration: none;">linkbrand.io/${me.slug} ↗</a>
    </div>
  </div>

  <!-- QR Section -->
  <div class="card" style="display:flex;flex-direction:row;align-items:center;gap:2rem;">
    <div class="qr-box" id="oqr" style="padding:12px;border-radius:12px;background:#fff;flex-shrink:0;"></div>
    <div>
        <div style="font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem;">QR Code</div>
        <div style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1rem;">${getLang() === 'ar' ? 'امسح هذا الرمز لزيارة صفحتك مباشرة' : 'Scan this code to instantly visit your brand page. You can download it from the QR tab.'}</div>
    </div>
  </div>
</div>

${links.length ? `<div class="card">
  <div class="sec-header" style="margin-bottom:1.2rem">
    <div class="sec-title" style="font-size:1.1rem">${t('myLinks')}</div>
    <span class="badge b-pu" style="font-size:.8rem;padding:.3rem .8rem">${links.length} ${getLang() === 'ar' ? 'نشط' : 'Active'}</span>
  </div>
  <div class="links-list">
    ${links.slice(0, 3).map(l => {
      const plat = PLATFORMS.find(p => p.icon === l.icon);
      const brandCls = plat ? `pl-${plat.key}` : '';
      return `<div class="link-item ${brandCls}" style="padding:1rem 1.2rem;transition:transform 0.2s ease, border-color 0.2s ease;"><div class="li-icon" style="font-size:1.3rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-sm)">${iconHtml(l.icon)}</div><div class="li-info"><div class="li-title" style="font-size:1rem;margin-bottom:4px;font-weight:600">${l.title}</div><div class="li-url" dir="ltr" style="font-size:.85rem;color:var(--text-muted)">${l.url}</div></div></div>`;
    }).join('')}
  </div>
</div>`
: `<div class="card"><div class="empty" style="padding:3.5rem 1rem"><div class="empty-icon" style="font-size:3.5rem;margin-bottom:1.2rem;opacity:0.8">🔗</div><div class="empty-title" style="font-size:1.35rem;margin-bottom:.5rem;font-weight:700">${t('noAccount').replace('?', '')}</div><div style="color:var(--text-muted);margin-bottom:1.8rem;font-size:.95rem;max-width:300px;margin-left:auto;margin-right:auto">${t('feat1Desc')}</div><button class="btn btn-p btn-lg" id="ogo" style="padding:.9rem 2rem;font-weight:600;font-size:.95rem">+ ${t('addLink')}</button></div></div>`}
`;
        }

        function secLinks(links) {
            return `
<div class="sec-header"><div><div class="sec-title">🔗 ${t('myLinks')}</div><div class="sec-sub">${t('feat1Desc')}</div></div>
<button class="btn btn-p" id="badd">+ ${t('addLink')}</button></div>
<div class="card">
${links.length === 0 ? `<div class="empty"><div class="empty-icon">🔗</div><div class="empty-title">${t('noAccount').replace('?', '')}</div><div>${t('addLink')}</div></div>`
                    : `<div class="links-list">${links.map(l => {
    const plat = PLATFORMS.find(p => p.icon === l.icon);
    const brandCls = plat ? `pl-${plat.key}` : '';
    return `
<div class="link-item ${brandCls}" draggable="true" data-id="${l.id}" style="cursor:grab">
  <div class="li-drag-handle" style="opacity:0.5;font-size:1.1rem"><i class="fa-solid fa-grip-vertical"></i></div>
  <div class="li-icon">${iconHtml(l.icon)}</div>
  <div class="li-info"><div class="li-title">${l.title}</div><div class="li-url" dir="ltr">${l.url}</div></div>
  <div class="li-actions">
    <button class="btn btn-g btn-sm bedit" data-id="${l.id}">✏️</button>
    <button class="btn-icon bdel" data-id="${l.id}" title="${t('deleteLink')}">🗑</button>
  </div>
</div>`;
}).join('')}</div>`}
</div>`;
        }

        function secQR(pUrl) {
            return `
<div class="sec-header"><div><div class="sec-title">📱 ${t('qrCode')}</div><div class="sec-sub">${t('feat2Desc')}</div></div></div>
<div class="card" style="display:flex;flex-direction:column;align-items:center;gap:1.4rem;padding:2.4rem">
  <div class="qr-box" id="qrmain"></div>
  <div class="qr-url" style="max-width:380px" dir="ltr">🌐 ${pUrl}</div>
  <div style="display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-p" id="qdl">⬇️ ${t('qrDownload')}</button>
    <button class="btn btn-g" id="qcopy">${t('copyLink')}</button>
  </div>
  <div class="sec-sub" style="text-align:center;max-width:360px">${t('feat2Desc')}</div>
</div>`;
        }

        function secProfile(me) {
            const currentTheme = me.themeColor || '#7c3aed';
            return `
<div class="sec-header" style="margin-bottom:1.5rem"><div><div class="sec-title">✏️ ${t('updateProfile')}</div><div class="sec-sub">${t('brandName')}</div></div></div>
<div class="card" style="max-width:560px;padding:2rem">
  <div class="prof-pic-row" style="display:flex;align-items:center;gap:1.5rem">
    <div id="plogo-preview" style="width:72px;height:72px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:bold;color:#fff;background:linear-gradient(135deg, var(--primary), #a78bfa);flex-shrink:0;box-shadow:0 8px 24px rgba(0,0,0,0.2)">
        ${me.logoUrl ? `<img src="${me.logoUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:12px"/>` : me.brandName.charAt(0).toUpperCase()}
    </div>
    <div style="flex-grow:1">
        <label class="btn btn-g btn-sm" style="cursor:pointer;display:inline-flex;align-items:center;gap:0.5rem">
            📸 ${getLang() === 'ar' ? 'رفع الشعار' : 'Upload Logo'}
            <input type="file" id="plogo-file" accept="image/png, image/jpeg, image/webp" style="display:none" />
        </label>
        <div style="font-size:0.75rem;color:var(--muted);margin-top:0.4rem">${getLang() === 'ar' ? 'ينصح بصورة مربعة (JPG, PNG)' : 'Square image recommended (JPG, PNG)'}</div>
    </div>
  </div>
  <div class="divider" style="margin:1.8rem 0;background:var(--border);height:1px"></div>
  <div class="form-group" style="margin-bottom:1.4rem">
    <label class="form-label" style="font-size:0.85rem;margin-bottom:0.5rem;display:block;color:var(--text2)">${t('brandName')}</label>
    <input class="form-input" id="pbn" value="${me.brandName}" maxlength="40" style="padding:0.9rem;font-size:1rem"/>
    <div class="form-helper" style="font-size:0.75rem;color:var(--muted);margin-top:0.4rem">${t('slugHint')}</div>
  </div>
  <div class="form-group" style="margin-bottom:1.4rem">
    <label class="form-label" style="font-size:0.85rem;margin-bottom:0.5rem;display:block;color:var(--text2)">${getLang() === 'ar' ? 'الاسم المعروض (عربي)' : 'Display Name (Arabic)'}</label>
    <input class="form-input" id="pdn-ar" value="${me.displayNameAr || ''}" maxlength="40" style="padding:0.9rem;font-size:1rem" placeholder="${getLang() === 'ar' ? 'الاسم الذي سيظهر للزوار' : 'Arabic name shown to visitors'}"/>
  </div>
  <div class="form-group" style="margin-bottom:1.4rem">
    <label class="form-label" style="font-size:0.85rem;margin-bottom:0.5rem;display:block;color:var(--text2)">${getLang() === 'ar' ? 'الاسم المعروض (انجليزي)' : 'Display Name (English)'}</label>
    <input class="form-input" id="pdn-en" value="${me.displayNameEn || ''}" maxlength="40" style="padding:0.9rem;font-size:1rem" placeholder="${getLang() === 'ar' ? 'English name shown to visitors' : 'English name shown to visitors'}" dir="ltr"/>
  </div>
  <div class="form-group" style="margin-bottom:1.4rem">
    <label class="form-label" style="font-size:0.85rem;margin-bottom:0.5rem;display:block;color:var(--text2)">${getLang() === 'ar' ? 'لون العلامة التجارية' : 'Brand Theme Color'}</label>
    <div style="display:flex;align-items:center;gap:1rem;background:rgba(255,255,255,0.03);padding:0.5rem;border-radius:var(--r-sm);border:1px solid var(--border)">
        <input type="color" id="ptheme" value="${currentTheme}" style="width:40px;height:40px;padding:0;border:none;border-radius:8px;cursor:pointer;background:transparent" />
        <span style="font-size:0.9rem;font-family:monospace;color:var(--text2)">${getLang() === 'ar' ? 'اختر اللون الرئيسي' : 'Choose primary color'}</span>
    </div>
  </div>
  <div class="form-group" style="margin-bottom:2rem">
    <label class="form-label" style="font-size:0.85rem;margin-bottom:0.5rem;display:block;color:var(--text2)">${t('email')}</label>
    <input class="form-input" value="${me.email}" disabled dir="ltr" style="opacity:0.5;padding:0.9rem;font-size:1rem;background:rgba(0,0,0,0.2)"/>
    <div class="form-helper" style="font-size:0.75rem;color:var(--muted);margin-top:0.4rem">${t('email')}</div>
  </div>
  <div><button class="btn btn-p" id="psave" style="width:100%;padding:1rem;font-size:1rem;font-weight:600">${t('saveChanges')}</button></div>
</div>`;
        }

        // ============================================================
        // PUBLIC PROFILE
        // ============================================================
        async function renderPublic(slug) {
            const brand = await getBrand(slug);
            if (!brand) { renderNotFound(slug); return; }
            const links = await getLinks(slug), pUrl = publicUrl(slug), init = brand.brandName.charAt(0).toUpperCase();
            const l = getLang();
            const displayName = l === 'ar' ? (brand.displayNameAr || brand.brandName) : (brand.displayNameEn || brand.brandName);

            // Apply custom theme for this brand page
            applyTheme(brand.themeColor);

            document.getElementById('app').innerHTML = `
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="page">
  <nav class="nav">
    <div class="nav-brand" id="pnl">🔗 LinkBrand</div>
    <div class="nav-actions">
       <button class="btn btn-g btn-sm" id="lang-toggle">${t('langName')}</button>
       <button class="btn btn-p btn-sm" id="pnc">${t('signup')}</button>
    </div>
  </nav>
  <div class="pub-page">
    <div class="pub-card">
      <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:.7rem">
        ${renderAvatar(brand, 'pub-avatar')}
        <div><div class="pub-brand">${displayName}</div><div class="pub-handle" dir="ltr">/${slug}</div></div>
      </div>
      ${links.length ? `<div class="pub-links">${links.map(lx => {
                const isHttp = /^https?:\/\//i.test(lx.url);
                const plat = PLATFORMS.find(p => p.icon === lx.icon);
                const brandCls = plat ? `pl-${plat.key}` : '';
                return `
        <a class="pub-link ${brandCls}" href="${lx.url}" ${isHttp ? 'target="_blank" rel="noopener noreferrer"' : ''}>
          <span class="pub-link-icon">${iconHtml(lx.icon)}</span>
          <span class="pub-link-name">${lx.title}</span>
          <span class="pub-link-arr">›</span>
        </a>`;
            }).join('')}</div>`
                    : `<div style="text-align:center;color:var(--muted);font-size:.88rem;padding:1.5rem 0">${t('noAccount').replace('?', '')}</div>`}
      <div class="pub-qr">
        <div class="pub-qr-lbl">${t('qrScan')}</div>
        <div class="qr-box" id="pubqr"></div>
        <button class="btn btn-g btn-sm" id="pcopy">${t('copyLink')}</button>
      </div>
      <div class="pub-footer">${t('footerText')}</div>
    </div>
  </div>
</div>`;
            q('#pnl').onclick = () => navigate('/');
            q('#lang-toggle').onclick = () => setLang(l === 'ar' ? 'en' : 'ar');
            q('#pnc').onclick = () => navigate('/signup');
            q('#pcopy').onclick = () => { navigator.clipboard.writeText(pUrl).then(() => { const bt = q('#pcopy'); bt.textContent = t('linkCopied'); setTimeout(() => bt.textContent = t('copyLink'), 2000); }); };
            makeQR('pubqr', pUrl, 160);
        }

        function renderNotFound(slug) {
            document.getElementById('app').innerHTML = `
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="page">
  <nav class="nav"><div class="nav-brand" id="nl">🔗 LinkBrand</div>
    <div class="nav-actions"><button class="btn btn-p btn-sm" id="nc">${t('signup')}</button></div>
  </nav>
  <div class="not-found">
    <div class="nf-code">404</div>
    <div style="font-size:1.2rem;font-weight:700">${t('notFound')}</div>
    <div style="color:var(--muted)">${t('notFoundDesc')} <strong dir="ltr">/${slug}</strong>.</div>
    <button class="btn btn-p btn-lg" id="nh">${t('backHome')}</button>
  </div>
</div>`;
            q('#nl').onclick = q('#nh').onclick = () => navigate('/'); q('#nc').onclick = () => navigate('/signup');
        }

        // ============================================================
        // ADMIN DASHBOARD
        // ============================================================
        async function renderAdmin(sec) {
            const me = getCurrentUser(); if (!me || !isAdmin(me)) { navigate('/dashboard'); return; }
            let active = sec || 'overview';

            async function draw() {
                document.getElementById('app').innerHTML = `
<div class="bg-orbs" style="opacity:.2"><div class="orb orb1"></div></div>
<div class="page" style="max-width:1400px">
  <nav class="nav">
    <div class="nav-brand" id="al">👑 Admin Control</div>
    <div class="nav-actions">
      <button class="btn btn-g btn-sm" id="adash">← ${t('dashboard')}</button>
    </div>
  </nav>
  <div class="dash-layout">
    <aside class="sidebar" style="width:240px">
      <div class="sb-label">Admin System</div>
      ${['overview', 'users', 'brands', 'links'].map(s => `
        <div class="sb-link${active === s ? ' active' : ''}" data-s="${s}">
          <span class="ic">${s === 'overview' ? '📊' : s === 'users' ? '👤' : s === 'brands' ? '🏢' : '🔗'}</span> ${s.charAt(0).toUpperCase() + s.slice(1)}
        </div>`).join('')}
    </aside>
    <main class="main" id="am">
       <div class="card"><div style="text-align:center;padding:2rem"><span class="spin"></span> Loading data...</div></div>
    </main>
  </div>
</div>`;
                bindAdminNav();
                await loadAdminData(active);
            }

            function bindAdminNav() {
                q('#al').onclick = () => navigate('/admin');
                q('#adash').onclick = () => navigate('/dashboard');
                qAll('.sb-link[data-s]').forEach(l => l.addEventListener('click', () => { active = l.dataset.s; draw(); }));
            }

            async function loadAdminData(s) {
                const main = q('#am');
                if (s === 'overview') {
                    // Quick counts
                    try {
                        const usersSnap = await db.collection("users").get();
                        const brandsSnap = await db.collection("brands").get();
                        const linksSnap = await db.collection("links").get();
                        main.innerHTML = `
                        <div class="sec-header" style="margin-bottom:1.5rem"><div><div class="sec-title">System Overview</div></div></div>
                        <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1.5rem">
                            <div class="card" style="text-align:center"><h2>${usersSnap.size}</h2><p style="color:var(--muted)">Total Users</p></div>
                            <div class="card" style="text-align:center"><h2>${brandsSnap.size}</h2><p style="color:var(--muted)">Total Brands</p></div>
                            <div class="card" style="text-align:center"><h2>${linksSnap.size}</h2><p style="color:var(--muted)">Total Links</p></div>
                        </div>`;
                    } catch (e) { main.innerHTML = `<div class="alert alert-e">Error: ${e.message}</div>`; }
                }
                else if (s === 'users') {
                    try {
                        const snap = await db.collection("users").get();
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.created || 0) - (a.created || 0));
                        const html = docs.map(u => {
                            const dateStr = u.created ? new Date(u.created).toLocaleString() : 'N/A';
                            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;border-bottom:1px solid var(--border)">
                                <div><strong>${u.email}</strong></div>
                                <div style="font-size:0.8rem;color:var(--muted)">ID: ${u.uid}</div>
                                <div style="font-size:0.8rem">${dateStr}</div>
                                <button class="btn btn-g btn-sm bdel-user" data-id="${u.id}">Delete</button>
                            </div>`;
                        }).join('') || '<div style="padding:1rem;text-align:center">No users found.</div>';

                        main.innerHTML = `<div class="sec-header" style="margin-bottom:1.5rem"><div><div class="sec-title">All Users</div></div></div><div class="card" style="padding:0">${html}</div>`;
                        main.querySelectorAll('.bdel-user').forEach(btn => btn.onclick = async () => {
                            if (confirm('Delete this user record permanently?')) {
                                await db.collection("users").doc(btn.dataset.id).delete();
                                loadAdminData('users');
                            }
                        });
                    } catch (e) { main.innerHTML = `<div class="alert alert-e">Error loading users. ${e.message}</div>`; }
                }
                else if (s === 'brands') {
                    try {
                        const snap = await db.collection("brands").get();
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.created || 0) - (a.created || 0));
                        const html = docs.map(b => {
                            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;border-bottom:1px solid var(--border)">
                                <div><strong>${b.brandName}</strong> <span style="color:var(--muted);font-size:0.8rem">/${b.slug}</span></div>
                                <div style="font-size:0.8rem">${b.email}</div>
                                <button class="btn btn-g btn-sm bdel" data-id="${b.id}">Delete</button>
                            </div>`;
                        }).join('') || '<div style="padding:1rem;text-align:center">No brands found.</div>';

                        main.innerHTML = `<div class="sec-header" style="margin-bottom:1.5rem"><div><div class="sec-title">All Brands</div></div></div><div class="card" style="padding:0">${html}</div>`;
                        main.querySelectorAll('.bdel').forEach(btn => btn.onclick = async () => {
                            if (confirm('Delete this brand permanently? This will not delete their auth layer, just the page metadata.')) {
                                await db.collection("brands").doc(btn.dataset.id).delete();
                                loadAdminData('brands');
                            }
                        });
                    } catch (e) { main.innerHTML = `<div class="alert alert-e">Error loading brands. ${e.message}</div>`; }
                }
                else if (s === 'links') {
                    try {
                        // Grab all and local-sort
                        const snap = await db.collection("links").get();
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (b.created || 0) - (a.created || 0));
                        const html = docs.map(l => {
                            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:1rem;border-bottom:1px solid var(--border)">
                                <div><strong>${l.title}</strong> <span style="color:var(--muted);font-size:0.8rem">(${l.slug})</span></div>
                                <div style="font-size:0.8rem;max-width:300px;overflow:hidden;text-overflow:ellipsis" dir="ltr"><a href="${l.url}" target="_blank" style="color:var(--primary)">${l.url}</a></div>
                                <button class="btn btn-g btn-sm btn-del-link" data-id="${l.id}">Delete</button>
                            </div>`;
                        }).join('') || '<div style="padding:1rem;text-align:center">No links found.</div>';

                        main.innerHTML = `<div class="sec-header" style="margin-bottom:1.5rem"><div><div class="sec-title">All Links</div></div></div><div class="card" style="padding:0">${html}</div>`;
                        main.querySelectorAll('.btn-del-link').forEach(btn => btn.onclick = async () => {
                            if (confirm('Delete this link permanently?')) {
                                await db.collection("links").doc(btn.dataset.id).delete();
                                loadAdminData('links');
                            }
                        });
                    } catch (e) { main.innerHTML = `<div class="alert alert-e">Error loading links. ${e.message}</div>`; }
                }
            }
            await draw();
        }

        // ============================================================
        // HELPERS
        // ============================================================
        function q(sel) { return document.querySelector(sel); }
        function qAll(sel) { return document.querySelectorAll(sel); }

        // ============================================================
        // INIT & ROUTES
        // ============================================================
        setLang(getLang());
        addRoute('/', async () => await renderLanding());
        addRoute('/login', async () => await renderAuth('login'));
        addRoute('/signup', async () => await renderAuth('signup'));
        addRoute('/dashboard', async () => { const me = getCurrentUser(); me ? await renderDashboard('overview') : navigate('/login'); });
        addRoute('/admin', async () => { const me = getCurrentUser(); isAdmin(me) ? await renderAdmin('overview') : navigate('/dashboard'); });
        // Catch-all for public profiles: /p/:slug
        addRoute(/^\/p\/([a-z0-9-]+)$/i, async m => await renderPublic(m[1]));
        // Legacy: /:slug direct
        setNotFound(async h => { const m = h.match(/^\/([a-z0-9-]+)$/i); m ? await renderPublic(m[1]) : renderNotFound(h.replace('/', '')); });

        resolveRoute();
    </script>
</body>

</html>
