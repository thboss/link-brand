<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>LinkBrand – شارك عالمك</title>
    <meta name="description"
        content="قم بإنشاء صفحة تجارية جميلة تحتوي على جميع روابط التواصل الاجتماعي الخاصة بك ورمز QR مخصص." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --font: 'Cairo', sans-serif;
            --bg-dark: #080b14;
            --bg-card: rgba(15, 20, 40, 0.75);
            --bg-card-solid: #0f1428;
            --border: rgba(255, 255, 255, 0.07);
            --border-h: rgba(255, 255, 255, 0.15);
            --g1: #7c3aed;
            --g2: #3b82f6;
            --g3: #06b6d4;
            --grad: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
            --grad-t: linear-gradient(135deg, #a78bfa, #60a5fa, #67e8f9);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --muted: #475569;
            --ok: #10b981;
            --err: #ef4444;
            --r: 16px;
            --r-sm: 8px;
            --r-lg: 24px;
            --r-xl: 32px;
            --tr: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: var(--font);
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-thumb {
            background: var(--g1);
            border-radius: 3px
        }

        #app {
            min-height: 100vh
        }

        /* ORBS */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(110px);
            opacity: .16;
            animation: drift 20s ease-in-out infinite alternate
        }

        .orb1 {
            width: 550px;
            height: 550px;
            background: var(--g1);
            top: -180px;
            left: -120px;
            animation-duration: 22s
        }

        .orb2 {
            width: 450px;
            height: 450px;
            background: var(--g2);
            bottom: -180px;
            right: -80px;
            animation-duration: 26s;
            animation-delay: -9s
        }

        .orb3 {
            width: 380px;
            height: 380px;
            background: var(--g3);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 16s;
            animation-delay: -4s;
            opacity: .09
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1)
            }

            100% {
                transform: translate(35px, 25px) scale(1.06)
            }
        }

        /* PAGE */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        /* NAVBAR */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .9rem 2rem;
            background: rgba(8, 11, 20, .85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100
        }

        .nav-brand {
            font-size: 1.35rem;
            font-weight: 800;
            background: var(--grad-t);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            letter-spacing: -.5px
        }

        .nav-actions {
            display: flex;
            gap: .65rem;
            align-items: center
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            padding: .55rem 1.2rem;
            border-radius: var(--r-sm);
            font-family: var(--font);
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: var(--tr);
            white-space: nowrap
        }

        .btn-p {
            background: var(--grad);
            color: #fff;
            box-shadow: 0 4px 18px rgba(124, 58, 237, .4)
        }

        .btn-p:hover {
            opacity: .88;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(124, 58, 237, .5)
        }

        .btn-g {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border)
        }

        .btn-g:hover {
            background: var(--bg-card);
            color: var(--text);
            border-color: var(--border-h);
            transform: translateY(-1px)
        }

        .btn-d {
            background: rgba(239, 68, 68, .12);
            color: var(--err);
            border: 1px solid rgba(239, 68, 68, .28)
        }

        .btn-d:hover {
            background: rgba(239, 68, 68, .22);
            transform: translateY(-1px)
        }

        .btn-sm {
            padding: .38rem .85rem;
            font-size: .8rem
        }

        .btn-lg {
            padding: .78rem 1.9rem;
            font-size: .98rem;
            border-radius: var(--r)
        }

        .btn-full {
            width: 100%;
            justify-content: center
        }

        .btn-icon {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border);
            width: 2rem;
            height: 2rem;
            padding: 0;
            border-radius: var(--r-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--tr)
        }

        .btn-icon:hover {
            color: var(--err);
            border-color: rgba(239, 68, 68, .4);
            background: rgba(239, 68, 68, .1)
        }

        /* LANDING */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5rem 1.5rem 4rem;
            gap: 1.4rem
        }

        .badge-pill {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            background: rgba(124, 58, 237, .12);
            border: 1px solid rgba(124, 58, 237, .3);
            color: #a78bfa;
            padding: .32rem .9rem;
            border-radius: 99px;
            font-size: .78rem;
            font-weight: 500;
            letter-spacing: .05em;
            text-transform: uppercase
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .35
            }
        }

        .hero-title {
            font-size: clamp(2.3rem, 7vw, 4.8rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px
        }

        .grad-text {
            background: var(--grad-t);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .hero-sub {
            max-width: 540px;
            color: var(--text2);
            font-size: 1.1rem;
            line-height: 1.7
        }

        .hero-cta {
            display: flex;
            gap: .9rem;
            flex-wrap: wrap;
            justify-content: center
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1.1rem;
            padding: 2rem 2rem 5rem;
            max-width: 940px;
            margin: 0 auto;
            width: 100%
        }

        .feat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 1.6rem;
            backdrop-filter: blur(20px);
            transition: var(--tr)
        }

        .feat:hover {
            border-color: var(--border-h);
            transform: translateY(-4px)
        }

        .feat-icon {
            font-size: 1.9rem;
            margin-bottom: .65rem;
            display: block
        }

        .feat-title {
            font-size: .95rem;
            font-weight: 700;
            margin-bottom: .35rem
        }

        .feat-desc {
            font-size: .84rem;
            color: var(--text2);
            line-height: 1.6
        }

        /* AUTH */
        .auth-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 2.4rem;
            width: 100%;
            max-width: 430px;
            backdrop-filter: blur(22px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, .5);
            animation: slideUp .4s ease
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(22px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.6rem
        }

        .auth-logo-h {
            font-size: 1.65rem;
            font-weight: 900;
            background: var(--grad-t);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .auth-logo-s {
            font-size: .82rem;
            color: var(--muted);
            margin-top: .2rem
        }

        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, .04);
            border-radius: var(--r-sm);
            padding: .18rem;
            margin-bottom: 1.6rem;
            gap: .2rem
        }

        .auth-tab {
            flex: 1;
            padding: .52rem;
            border-radius: 6px;
            font-family: var(--font);
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted);
            transition: var(--tr);
            text-align: center
        }

        .auth-tab.active {
            background: var(--grad);
            color: #fff
        }

        .form-group {
            margin-bottom: 1rem
        }

        .form-label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: .35rem;
            letter-spacing: .03em
        }

        .form-input {
            width: 100%;
            padding: .68rem .95rem;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-family: var(--font);
            font-size: .93rem;
            transition: var(--tr);
            outline: none
        }

        .form-input:focus {
            border-color: var(--g1);
            background: rgba(124, 58, 237, .06);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, .15)
        }

        .form-input::placeholder {
            color: var(--muted)
        }

        .form-input option {
            background-color: var(--bg-card-solid);
            color: var(--text);
        }

        .form-input:disabled {
            opacity: .45;
            cursor: not-allowed
        }

        .form-helper {
            font-size: .76rem;
            color: var(--muted);
            margin-top: .32rem
        }

        .alert {
            padding: .7rem .95rem;
            border-radius: var(--r-sm);
            font-size: .84rem;
            margin-bottom: .9rem;
            display: flex;
            align-items: center;
            gap: .45rem
        }

        .alert-e {
            background: rgba(239, 68, 68, .12);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #fca5a5
        }

        .alert-s {
            background: rgba(16, 185, 129, .12);
            border: 1px solid rgba(16, 185, 129, .3);
            color: #6ee7b7
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.1rem;
            font-size: .84rem;
            color: var(--muted)
        }

        .auth-switch a {
            color: #a78bfa;
            cursor: pointer;
            font-weight: 600
        }

        .auth-switch a:hover {
            color: #c4b5fd
        }

        /* DASHBOARD */
        .dash-layout {
            flex: 1;
            display: grid;
            grid-template-columns: 272px 1fr;
            min-height: calc(100vh - 63px)
        }

        @media(max-width:768px) {
            .dash-layout {
                grid-template-columns: 1fr
            }
        }

        .sidebar {
            background: rgba(10, 14, 28, .92);
            border-left: 1px solid var(--border);
            padding: 1.4rem .9rem;
            display: flex;
            flex-direction: column;
            gap: .35rem;
            backdrop-filter: blur(20px)
        }

        .sb-label {
            font-size: .68rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted);
            padding: .45rem .7rem;
            margin-top: .4rem
        }

        .sb-link {
            display: flex;
            align-items: center;
            gap: .7rem;
            padding: .65rem .8rem;
            border-radius: var(--r-sm);
            color: var(--text2);
            font-weight: 500;
            font-size: .88rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: var(--tr)
        }

        .sb-link:hover {
            background: rgba(255, 255, 255, .05);
            color: var(--text)
        }

        .sb-link.active {
            background: rgba(124, 58, 237, .16);
            border-color: rgba(124, 58, 237, .32);
            color: #a78bfa
        }

        .sb-link .ic {
            font-size: 1rem;
            width: 18px;
            text-align: center
        }

        .sb-profile {
            margin-top: auto;
            padding: .9rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r)
        }

        .sb-name {
            font-weight: 700;
            font-size: .92rem
        }

        .sb-handle {
            font-size: .77rem;
            color: var(--muted)
        }

        .main {
            padding: 1.8rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.8rem
        }

        .sec-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .9rem
        }

        .sec-title {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -.5px
        }

        .sec-sub {
            font-size: .84rem;
            color: var(--text2);
            margin-top: .2rem
        }

        /* CARDS */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 1.6rem;
            backdrop-filter: blur(16px);
            transition: var(--tr)
        }

        .card:hover {
            border-color: var(--border-h)
        }

        .p-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.4rem
        }

        @media(max-width:600px) {
            .p-grid {
                grid-template-columns: 1fr
            }
        }

        .qr-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .9rem
        }

        .qr-box {
            background: #fff;
            border-radius: var(--r);
            padding: 10px;
            box-shadow: 0 6px 28px rgba(0, 0, 0, .4)
        }

        .qr-url {
            font-size: .76rem;
            color: var(--muted);
            word-break: break-all;
            text-align: center;
            background: rgba(255, 255, 255, .04);
            padding: .38rem .7rem;
            border-radius: var(--r-sm);
            border: 1px solid var(--border);
            width: 100%;
            display: flex;
            align-items: center;
            gap: .35rem
        }

        .stat-val {
            font-size: 1.7rem;
            font-weight: 900;
            background: var(--grad-t);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .stat-lbl {
            font-size: .74rem;
            color: var(--muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .05em
        }

        /* LINKS list */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: .7rem
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: .9rem;
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: .9rem 1.1rem;
            transition: var(--tr)
        }

        .link-item:hover {
            border-color: var(--border-h);
            background: rgba(255, 255, 255, .05)
        }

        .li-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            background: rgba(124, 58, 237, .14);
            border: 1px solid rgba(124, 58, 237, .22)
        }

        .li-info {
            flex: 1;
            overflow: hidden
        }

        .li-title {
            font-weight: 700;
            font-size: .92rem
        }

        .li-url {
            font-size: .77rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px
        }

        .li-actions {
            display: flex;
            gap: .35rem;
            flex-shrink: 0
        }

        /* EMPTY */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2.8rem 2rem;
            gap: .7rem;
            color: var(--muted)
        }

        .empty-icon {
            font-size: 2.8rem;
            opacity: .35
        }

        .empty-title {
            font-size: .95rem;
            font-weight: 600;
            color: var(--text2)
        }

        /* MODAL */
        .modal-back {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(0, 0, 0, .62);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn .2s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .modal {
            background: #0e1326;
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 1.9rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, .6);
            animation: slideUp .3s ease;
            position: relative
        }

        .modal-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.3rem
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 800
        }

        .modal-x {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            line-height: 1;
            cursor: pointer;
            padding: .2rem;
            transition: var(--tr)
        }

        .modal-x:hover {
            color: var(--text)
        }

        .modal select.form-input {
            cursor: pointer
        }

        /* TOAST */
        .toast-wrap {
            position: fixed;
            bottom: 1.4rem;
            left: 1.4rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: .45rem
        }

        .toast {
            background: #1c2740;
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: .8rem 1.15rem;
            display: flex;
            align-items: center;
            gap: .55rem;
            font-size: .84rem;
            font-weight: 500;
            box-shadow: 0 6px 26px rgba(0, 0, 0, .4);
            animation: toastIn .3s ease;
            max-width: 300px
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-18px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .toast.ok {
            border-color: rgba(16, 185, 129, .4)
        }

        .toast.er {
            border-color: rgba(239, 68, 68, .4)
        }

        /* PUBLIC PROFILE */
        .pub-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 4rem
        }

        .pub-card {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.65rem
        }

        .badge-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ok);
            margin-left: .2rem
        }

        .pub-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, .3), 0 0 38px rgba(124, 58, 237, .35);
            animation: glow 3s ease-in-out infinite alternate
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 0 4px rgba(124, 58, 237, .3), 0 0 28px rgba(124, 58, 237, .3)
            }

            100% {
                box-shadow: 0 0 0 6px rgba(59, 130, 246, .3), 0 0 55px rgba(59, 130, 246, .4)
            }

        function getLang() { return localStorage.getItem('lb_lang') || 'ar'; }
        function setLang(l) {
            localStorage.setItem('lb_lang', l);
            document.documentElement.dir = l === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = l;
            document.body.style.fontFamily = l === 'ar' ? "'Cairo', sans-serif" : "'Inter', sans-serif";
            resolveRoute(); // Re-render current page
        }
        function t(key) {
            const keys = key.split('.');
            let val = TRANSLATIONS[getLang()];
            for (const k of keys) { val = val[k]; if (!val) break; }
            return val || key;
        }

        // Initialize direction on load
        setLang(getLang());
        // ============================================================
        // UTILS
        // ============================================================
        function slugify(t) {
            return t.toString().toLowerCase().trim()
                .replace(/\s+/g, '-').replace(/[^\w-]+/g, '').replace(/--+/g, '-')
                .replace(/^-+/, '').replace(/-+$/, '');
        }
        function ensureHttp(u) { if (!u) return u; return /^https?:\/\//i.test(u) ? u : 'https://' + u; }
        function isEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
        function uid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }

        // ============================================================
        // TOAST
        // ============================================================
        function toast(msg, type = 'ok', dur = 3000) {
            const wrap = document.getElementById('toast-wrap');
            const icons = { ok: '✅', er: '❌', warn: '⚠️', info: 'ℹ️' };
            const el = document.createElement('div');
            el.className = 'toast ' + (type === 'ok' ? 'ok' : 'er');
            el.innerHTML = `<span>${icons[type] || '✅'}</span><span>${msg}</span>`;
            wrap.appendChild(el);
            setTimeout(() => { el.style.transition = 'all .3s ease'; el.style.opacity = '0'; el.style.transform = 'translateX(-18px)'; setTimeout(() => el.remove(), 300); }, dur);
        }

        // ============================================================
        // MODAL
        // ============================================================
        let _modal = null;
        function openModal(title, buildFn) {
            closeModal();
            const back = document.createElement('div'); back.className = 'modal-back';
            back.innerHTML = `<div class="modal"><div class="modal-hd"><div class="modal-title">${title}</div><button class="modal-x">&times;</button></div><div id="modal-body"></div></div>`;
            back.querySelector('.modal-x').onclick = closeModal;
            back.addEventListener('click', e => { if (e.target === back) closeModal(); });
            document.body.appendChild(back); _modal = back;
            buildFn(back.querySelector('#modal-body'));
        }
        function closeModal() { if (_modal) { _modal.remove(); _modal = null; } }

        // Expose to window for HTML handlers
        window.navigate = navigate;

        // ============================================================
        // AUTH  (Firebase)
        // ============================================================
        function getCurrentUser() { try { return JSON.parse(sessionStorage.getItem('lb_me')) || null; } catch { return null; } }
        function setUser(u) { u ? sessionStorage.setItem('lb_me', JSON.stringify(u)) : sessionStorage.removeItem('lb_me'); }

        async function signup(email, password, brandName) {
            const slug = slugify(brandName);
            if (!email || !password || !brandName) return { ok: false, err: 'جميع الحقول مطلوبة.' };
            if (password.length < 6) return { ok: false, err: 'يجب أن تكون كلمة المرور 6 أحرف على الأقل.' };

            try {
                // Check if slug is taken in Firestore
                const snap = await db.collection("brands").where("slug", "==", slug).get();
                if (!snap.empty) return { ok: false, err: 'هذا الرابط مستخدم بالفعل، اختر اسماً آخر.' };

                const cred = await auth.createUserWithEmailAndPassword(email, password);
                const user = cred.user;

                // Save brand info to Firestore
                await db.collection("brands").doc(user.uid).set({
                    brandName,
                    slug,
                    email,
                    uid: user.uid,
                    created: Date.now()
                });

                const safe = { email, brandName, slug, uid: user.uid };
                setUser(safe);
                return { ok: true, user: safe };
            } catch (e) {
                let msg = e.message;
                if (e.code === 'auth/email-already-in-use') msg = 'البريد الإلكتروني مستخدم بالفعل.';
                return { ok: false, err: msg };
            }
        }

        async function login(email, password) {
            if (!email || !password) return { ok: false, err: 'البريد الإلكتروني وكلمة المرور مطلوبان.' };
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                const user = cred.user;

                // Fetch brand info from Firestore
                const d = await db.collection("brands").doc(user.uid).get();
                if (!d.exists) return { ok: false, err: 'المستخدم غير موجود في قاعدة البيانات.' };

                const brandData = d.data();
                const safe = { email: user.email, brandName: brandData.brandName, slug: brandData.slug, uid: user.uid };
                setUser(safe);
                return { ok: true, user: safe };
            } catch (e) {
                let msg = e.message;
                if (e.code === 'auth/invalid-credential') msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
                if (e.code === 'auth/user-not-found') msg = 'المستخدم غير موجود.';
                return { ok: false, err: msg };
            }
        }

        async function logout() {
            await auth.signOut();
            setUser(null);
        }

        // Persistent Auth State Handler
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const d = await db.collection("brands").doc(user.uid).get();
                if (d.exists) {
                    const brandData = d.data();
                    setUser({ email: user.email, brandName: brandData.brandName, slug: brandData.slug, uid: user.uid });
                }
            } else {
                setUser(null);
            }
        });
        async function updateProfile(updates) {
            const me = getCurrentUser(); if (!me) return { ok: false, err: 'Not authenticated.' };
            try {
                const brandRef = db.collection("brands").doc(me.uid);
                if (updates.brandName) {
                    const ns = slugify(updates.brandName);
                    // Check slug uniqueness (excluding current user)
                    const snap = await db.collection("brands").where("slug", "==", ns).get();

        // Custom Dropdown Helper
        function setupCustomSelect(elId, options, initialVal, onSelect) {
            const container = document.getElementById(elId);
            let selected = options.find(o => o.value === initialVal) || options[0];

            function render() {
                container.innerHTML = `
                    <div class="custom-select">
                        <div class="select-btn">
                            <span style="display:flex;align-items:center;gap:.7rem">${selected.icon ? iconHtml(selected.icon) : ''} ${selected.label}</span>
                            <i class="fa-solid fa-chevron-down" style="font-size:.8rem;opacity:.5"></i>
                        </div>
                        <div class="select-content">
                            ${options.map(o => `
                                <div class="select-item" data-val="${o.value}">
                                    ${o.icon ? iconHtml(o.icon) : ''} <span>${o.label}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                bind();
            }
            function bind() {
                const btn = container.querySelector('.select-btn');
                const content = container.querySelector('.select-content');
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const isOpen = content.classList.contains('open');
                    document.querySelectorAll('.select-content.open').forEach(c => c.classList.remove('open'));
                    if (!isOpen) content.classList.add('open');
                };
                container.querySelectorAll('.select-item').forEach(item => {
                    item.onclick = () => {
                        const val = item.dataset.val;
                        selected = options.find(o => o.value === val);
                        content.classList.remove('open');
                        render();
                        onSelect(val);
                    };
                });
            }
            window.addEventListener('click', () => {
                const open = container.querySelector('.select-content.open');
                if (open) open.classList.remove('open');
            });
            render();
        }

        // ============================================================
        // ROUTER
        // ============================================================
        const _routes = []; let _notFound = null;
        function addRoute(path, fn) { _routes.push({ path, fn }); }
        function setNotFound(fn) { _notFound = fn; }
        function navigate(path) { window.location.hash = path; }
        function getHash() { return window.location.hash.slice(1) || '/'; }
        async function resolveRoute() {
            const h = getHash();
            for (const r of _routes) {
                if (typeof r.path === 'string' && r.path === h) { await r.fn({}); return; }
                if (r.path instanceof RegExp) { const m = h.match(r.path); if (m) { await r.fn(m); return; } }
            }
            if (_notFound) await _notFound(h);
        }
        window.addEventListener('hashchange', resolveRoute);
        window.addEventListener('load', resolveRoute);

${links.length ? `<div class="card"><div class="sec-header" style="margin-bottom:.9rem"><div class="sec-title" style="font-size:.98rem">${t('myLinks')}</div><span class="badge b-pu">${links.length} ${getLang() === 'ar' ? 'نشط' : 'Active'}</span></div>
<div class="links-list">${links.slice(0, 3).map(l => `<div class="link-item"><div class="li-icon">${iconHtml(l.icon)}</div><div class="li-info"><div class="li-title">${l.title}</div><div class="li-url" dir="ltr">${l.url}</div></div></div>`).join('')}</div></div>`
                    : `<div class="card"><div class="empty"><div class="empty-icon">🔗</div><div class="empty-title">${t('noAccount').replace('?', '')}</div><div>${t('feat1Desc')}</div><button class="btn btn-p" id="ogo" style="margin-top:.5rem">+ ${t('addLink')}</button></div></div>`}
`;
        }

        function secLinks(links) {
            return `
<div class="sec-header"><div><div class="sec-title">🔗 ${t('myLinks')}</div><div class="sec-sub">${t('feat1Desc')}</div></div>
<button class="btn btn-p" id="badd">+ ${t('addLink')}</button></div>
<div class="card">
${links.length === 0 ? `<div class="empty"><div class="empty-icon">🔗</div><div class="empty-title">${t('noAccount').replace('?', '')}</div><div>${t('addLink')}</div></div>`
                    : `<div class="links-list">${links.map(l => `
<div class="link-item">
  <div class="li-icon">${iconHtml(l.icon)}</div>
  <div class="li-info"><div class="li-title">${l.title}</div><div class="li-url" dir="ltr">${l.url}</div></div>
  <div class="li-actions">
    <button class="btn btn-g btn-sm bedit" data-id="${l.id}">✏️</button>
    <button class="btn-icon bdel" data-id="${l.id}" title="${t('deleteLink')}">🗑</button>
  </div>
</div>`).join('')}</div>`}
</div>`;
        }

        function secQR(pUrl) {
            return `
<div class="sec-header"><div><div class="sec-title">📱 ${t('qrCode')}</div><div class="sec-sub">${t('feat2Desc')}</div></div></div>
<div class="card" style="display:flex;flex-direction:column;align-items:center;gap:1.4rem;padding:2.4rem">
  <div class="qr-box" id="qrmain"></div>
  <div class="qr-url" style="max-width:380px" dir="ltr">🌐 ${pUrl}</div>
  <div style="display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-p" id="qdl">⬇️ ${t('qrDownload')}</button>
    <button class="btn btn-g" id="qcopy">${t('copyLink')}</button>
  </div>
  <div class="sec-sub" style="text-align:center;max-width:360px">${t('feat2Desc')}</div>
</div>`;
        }

        function secProfile(me) {
            return `
<div class="sec-header"><div><div class="sec-title">✏️ ${t('updateProfile')}</div><div class="sec-sub">${t('brandName')}</div></div></div>
<div class="card" style="max-width:500px">
  <div class="prof-pic-row">
    <div class="prof-av">${me.brandName.charAt(0).toUpperCase()}</div>
    <div><div class="prof-name">${me.brandName}</div><div class="prof-email" dir="ltr">${me.email}</div></div>
  </div>
  <div class="divider" style="margin-bottom:1.15rem"></div>
  <div class="form-group"><label class="form-label">${t('brandName')}</label><input class="form-input" id="pbn" value="${me.brandName}" maxlength="40"/>
    <div class="form-helper">${t('slugHint')}</div></div>
  <div class="form-group"><label class="form-label">${t('email')}</label><input class="form-input" value="${me.email}" disabled dir="ltr"/><div class="form-helper">${t('email')}</div></div>
  <div style="margin-top:1.1rem"><button class="btn btn-p" id="psave">${t('saveChanges')}</button></div>
</div>`;
        }

        // ============================================================
        // PUBLIC PROFILE
        // ============================================================
        async function renderPublic(slug) {
            const brand = await getBrand(slug);
            if (!brand) { renderNotFound(slug); return; }
            const links = await getLinks(slug), pUrl = publicUrl(slug), init = brand.brandName.charAt(0).toUpperCase();
            const l = getLang();
            document.getElementById('app').innerHTML = `
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="page">
  <nav class="nav">
    <div class="nav-brand" id="pnl">🔗 LinkBrand</div>
    <div class="nav-actions">
       <button class="btn btn-g btn-sm" id="lang-toggle">${t('langName')}</button>
       <button class="btn btn-p btn-sm" id="pnc">${t('signup')}</button>
    </div>
  </nav>
  <div class="pub-page">
    <div class="pub-card">
      <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:.7rem">
        <div class="pub-avatar">${init}</div>
        <div><div class="pub-brand">${brand.brandName}</div><div class="pub-handle" dir="ltr">/${slug}</div></div>
      </div>
      ${links.length ? `<div class="pub-links">${links.map(lx => `
        <a class="pub-link" href="${lx.url}" target="_blank" rel="noopener noreferrer">
          <span class="pub-link-icon">${iconHtml(lx.icon)}</span>
          <span class="pub-link-name">${lx.title}</span>
          <span class="pub-link-arr">›</span>
        </a>`).join('')}</div>`
                    : `<div style="text-align:center;color:var(--muted);font-size:.88rem;padding:1.5rem 0">${t('noAccount').replace('?', '')}</div>`}
      <div class="pub-qr">
        <div class="pub-qr-lbl">${t('qrScan')}</div>
        <div class="qr-box" id="pubqr"></div>
        <button class="btn btn-g btn-sm" id="pcopy">${t('copyLink')}</button>
      </div>
      <div class="pub-footer">${t('footerText')}</div>
    </div>
  </div>
</div>`;
            q('#pnl').onclick = () => navigate('/');
            q('#lang-toggle').onclick = () => setLang(l === 'ar' ? 'en' : 'ar');
            q('#pnc').onclick = () => navigate('/signup');
            q('#pcopy').onclick = () => { navigator.clipboard.writeText(pUrl).then(() => { const bt = q('#pcopy'); bt.textContent = t('linkCopied'); setTimeout(() => bt.textContent = t('copyLink'), 2000); }); };
            makeQR('pubqr', pUrl, 160);
        }

        function renderNotFound(slug) {
            document.getElementById('app').innerHTML = `
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="page">
  <nav class="nav"><div class="nav-brand" id="nl">🔗 LinkBrand</div>
    <div class="nav-actions"><button class="btn btn-p btn-sm" id="nc">${t('signup')}</button></div>
  </nav>
  <div class="not-found">
    <div class="nf-code">404</div>
    <div style="font-size:1.2rem;font-weight:700">${t('notFound')}</div>
    <div style="color:var(--muted)">${t('notFoundDesc')} <strong dir="ltr">/${slug}</strong>.</div>
    <button class="btn btn-p btn-lg" id="nh">${t('backHome')}</button>
  </div>
</div>`;
            q('#nl').onclick = q('#nh').onclick = () => navigate('/'); q('#nc').onclick = () => navigate('/signup');
        }

        // ============================================================
        // HELPERS
        // ============================================================
        function q(sel) { return document.querySelector(sel); }
        function qAll(sel) { return document.querySelectorAll(sel); }

        // ============================================================
        // INIT & ROUTES
        // ============================================================
        addRoute('/', async () => await renderLanding());
        addRoute('/login', async () => await renderAuth('login'));
        addRoute('/signup', async () => await renderAuth('signup'));
        addRoute('/dashboard', async () => { const me = getCurrentUser(); me ? await renderDashboard('overview') : navigate('/login'); });
        // Catch-all for public profiles: /p/:slug
        addRoute(/^\/p\/([a-z0-9-]+)$/i, async m => await renderPublic(m[1]));
        // Legacy: /:slug direct
        setNotFound(async h => { const m = h.match(/^\/([a-z0-9-]+)$/i); m ? await renderPublic(m[1]) : renderNotFound(h.replace('/', '')); });

        resolveRoute();
    </script>
</body>

</html>
