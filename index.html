<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>LinkBrand – شارك عالمك</title>
    <meta name="description"
        content="قم بإنشاء صفحة تجارية جميلة تحتوي على جميع روابط التواصل الاجتماعي الخاصة بك ورمز QR مخصص." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --font: 'Cairo', sans-serif;
            --bg-dark: #080b14;
            --bg-card: rgba(15, 20, 40, 0.75);
            --bg-card-solid: #0f1428;
            --border: rgba(255, 255, 255, 0.07);
            --border-h: rgba(255, 255, 255, 0.15);
            --primary: #7c3aed;
            --primary-rgb: 124, 58, 237;
            --g1: var(--primary);
            --g2: #3b82f6;
            --g3: #06b6d4;
            --grad: linear-gradient(135deg, var(--g1), var(--g2), var(--g3));
            --grad-t: linear-gradient(135deg, var(--primary), #60a5fa, #67e8f9);
            --text: #f1f5f9;
            --text2: #94a3b8;
            --muted: #475569;
            --ok: #10b981;
            --err: #ef4444;
            --r: 16px;
            --r-sm: 8px;
            --r-lg: 24px;
            --r-xl: 32px;
            --tr: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: var(--font);
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased
        }

        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-thumb {
            background: var(--g1);
            border-radius: 3px
        }

        #app {
            min-height: 100vh
        }

        /* ORBS */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(110px);
            opacity: .16;
            animation: drift 20s ease-in-out infinite alternate
        }

        .orb1 {
            width: 550px;
            height: 550px;
            background: var(--g1);
            top: -180px;
            left: -120px;
            animation-duration: 22s
        }

        .orb2 {
            width: 450px;
            height: 450px;
            background: var(--g2);
            bottom: -180px;
            right: -80px;
            animation-duration: 26s;
            animation-delay: -9s
        }

        .orb3 {
            width: 380px;
            height: 380px;
            background: var(--g3);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-duration: 16s;
            animation-delay: -4s;
            opacity: .09
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0) scale(1)
            }

            100% {
                transform: translate(35px, 25px) scale(1.06)
            }
        }

        /* PAGE */
        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        /* NAVBAR */
        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .8rem 1rem;
            background: rgba(8, 11, 20, .85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100
        }
        
        @media(min-width: 768px) {
            .nav {
                padding: .9rem 2rem;
            }
        }

        .nav-brand {
            font-size: 1.35rem;
            font-weight: 800;
            background: var(--grad-t);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            letter-spacing: -.5px
        }

        .nav-actions {
            display: flex;
            gap: .65rem;
            align-items: center
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            padding: .55rem 1.2rem;
            border-radius: var(--r-sm);
            font-family: var(--font);
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: var(--tr);
            white-space: nowrap
        }

        .btn-p {
            background: var(--grad);
            color: #fff;
            box-shadow: 0 4px 18px rgba(var(--primary-rgb), .4)
        }

        .btn-p:hover {
            opacity: .88;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(var(--primary-rgb), .5)
        }

        .btn-g {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border)
        }

        .btn-g:hover {
            background: var(--bg-card);
            color: var(--text);
            border-color: var(--border-h);
            transform: translateY(-1px)
        }

        .btn-d {
            background: rgba(239, 68, 68, .12);
            color: var(--err);
            border: 1px solid rgba(239, 68, 68, .28)
        }

        .btn-d:hover {
            background: rgba(239, 68, 68, .22);
            transform: translateY(-1px)
        }

        .btn-sm {
            padding: .38rem .85rem;
            font-size: .8rem
        }

        .btn-lg {
            padding: .78rem 1.9rem;
            font-size: .98rem;
            border-radius: var(--r)
        }

        .btn-full {
            width: 100%;
            justify-content: center
        }

        .btn-icon {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border);
            width: 2rem;
            height: 2rem;
            padding: 0;
            border-radius: var(--r-sm);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--tr)
        }

        .btn-icon:hover {
            color: var(--err);
            border-color: rgba(239, 68, 68, .4);
            background: rgba(239, 68, 68, .1)
        }

        /* LANDING */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5rem 1.5rem 4rem;
            gap: 1.4rem
        }

        .badge-pill {
            display: inline-flex;
            align-items: center;
            gap: .45rem;
            background: rgba(var(--primary-rgb), .12);
            border: 1px solid rgba(var(--primary-rgb), .3);
            color: var(--primary);
            padding: .32rem .9rem;
            border-radius: 99px;
            font-size: .78rem;
            font-weight: 500;
            letter-spacing: .05em;
            text-transform: uppercase
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            animation: pulse 2s infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .35
            }
        }

        .hero-title {
            font-size: clamp(2.3rem, 7vw, 4.8rem);
            font-weight: 900;
            line-height: 1.05;
            letter-spacing: -2px
        }

        .grad-text {
            background: var(--grad-t);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .hero-sub {
            max-width: 540px;
            color: var(--text2);
            font-size: 1.1rem;
            line-height: 1.7
        }

        .hero-cta {
            display: flex;
            gap: .9rem;
            flex-wrap: wrap;
            justify-content: center
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 1.1rem;
            padding: 2rem 2rem 5rem;
            max-width: 940px;
            margin: 0 auto;
            width: 100%
        }

        .feat {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 1.6rem;
            backdrop-filter: blur(20px);
            transition: var(--tr)
        }

        .feat:hover {
            border-color: var(--border-h);
            transform: translateY(-4px)
        }

        .feat-icon {
            font-size: 1.9rem;
            margin-bottom: .65rem;
            display: block
        }

        .feat-title {
            font-size: .95rem;
            font-weight: 700;
            margin-bottom: .35rem
        }

        .feat-desc {
            font-size: .84rem;
            color: var(--text2);
            line-height: 1.6
        }

        /* AUTH */
        .auth-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem
        }

        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 2.4rem;
            width: 100%;
            max-width: 430px;
            backdrop-filter: blur(22px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, .5);
            animation: slideUp .4s ease
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(22px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.6rem
        }

        .auth-logo-h {
            font-size: 1.65rem;
            font-weight: 900;
            background: var(--grad-t);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .auth-logo-s {
            font-size: .82rem;
            color: var(--muted);
            margin-top: .2rem
        }

        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, .04);
            border-radius: var(--r-sm);
            padding: .18rem;
            margin-bottom: 1.6rem;
            gap: .2rem
        }

        .auth-tab {
            flex: 1;
            padding: .52rem;
            border-radius: 6px;
            font-family: var(--font);
            font-size: .88rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--muted);
            transition: var(--tr);
            text-align: center
        }

        .auth-tab.active {
            background: var(--grad);
            color: #fff
        }

        .form-group {
            margin-bottom: 1rem
        }

        .form-label {
            display: block;
            font-size: .8rem;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: .35rem;
            letter-spacing: .03em
        }

        .form-input {
            width: 100%;
            padding: .68rem .95rem;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-family: var(--font);
            font-size: .93rem;
            transition: var(--tr);
            outline: none
        }

        .form-input:focus {
            border-color: var(--g1);
            background: rgba(var(--primary-rgb), .06);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb), .15)
        }

        .form-input::placeholder {
            color: var(--muted)
        }

        .form-input option {
            background-color: var(--bg-card-solid);
            color: var(--text);
        }

        .form-input:disabled {
            opacity: .45;
            cursor: not-allowed
        }

        .form-helper {
            font-size: .76rem;
            color: var(--muted);
            margin-top: .32rem
        }

        .alert {
            padding: .7rem .95rem;
            border-radius: var(--r-sm);
            font-size: .84rem;
            margin-bottom: .9rem;
            display: flex;
            align-items: center;
            gap: .45rem
        }

        .alert-e {
            background: rgba(239, 68, 68, .12);
            border: 1px solid rgba(239, 68, 68, .3);
            color: #fca5a5
        }

        .alert-s {
            background: rgba(16, 185, 129, .12);
            border: 1px solid rgba(16, 185, 129, .3);
            color: #6ee7b7
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.1rem;
            font-size: .84rem;
            color: var(--muted)
        }

        .auth-switch a {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600
        }

        .auth-switch a:hover {
            color: #c4b5fd
        }

        /* DASHBOARD */
        /* DASHBOARD */
        .dashboard-layout {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 65px);
            position: relative;
            padding-bottom: 60px;
        }
        @media (min-width: 768px) {
            .dashboard-layout {
                flex-direction: row;
                gap: 2rem;
                padding: 2rem;
                padding-bottom: 2rem;
                max-width: 1400px;
                margin: 0 auto;
                width: 100%;
                align-items: flex-start;
            }
        }
        .mobile-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            background: rgba(10, 14, 28, 0.85);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 65px;
            z-index: 40;
        }
        @media (min-width: 768px) { .mobile-top-bar { display: none; } }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(10, 14, 28, 0.85);
            backdrop-filter: blur(24px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem calc(0.5rem + env(safe-area-inset-bottom));
            z-index: 50;
        }
        @media (min-width: 768px) { .bottom-nav { display: none; } }
        .bn-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            color: var(--text2);
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.5rem 0.75rem;
            border-radius: var(--r-sm);
            text-decoration: none;
            transition: var(--tr);
            cursor: pointer;
        }
        .bn-item.active { color: var(--primary); }
        .bn-item .ic {
            font-size: 1.25rem;
            margin-bottom: 0.1rem;
            transition: transform 0.2s ease;
        }
        .bn-item.active .ic { transform: scale(1.15); }
        .desktop-sidebar { display: none; }
        @media (min-width: 768px) {
            .desktop-sidebar {
                display: flex;
                flex-direction: column;
                width: 280px;
                flex-shrink: 0;
                background: rgba(15, 20, 35, 0.4);
                border: 1px solid rgba(255, 255, 255, 0.05);
                border-radius: var(--r-xl);
                padding: 1.5rem;
                backdrop-filter: blur(24px);
                box-shadow: 0 16px 40px rgba(0, 0, 0, 0.2);
                position: sticky;
                top: calc(65px + 2rem);
            }
        }
        .sidebar-section-label {
            display: block; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--text2); padding: 0.5rem 0.75rem;
            margin-top: 1rem; margin-bottom: 0.2rem;
        }
        .sidebar-link {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1rem; border-radius: var(--r-sm);
            color: var(--text2); font-weight: 600; font-size: 0.95rem;
            cursor: pointer; border: 1px solid transparent;
            transition: var(--tr); text-decoration: none;
        }
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text); transform: translateX(4px);
        }
        .sidebar-link.active {
            background: rgba(var(--primary-rgb), 0.12);
            border-color: rgba(var(--primary-rgb), 0.2); color: var(--primary);
        }
        .sidebar-link .icon { font-size: 1.2rem; width: 24px; text-align: center; }
        .sidebar-profile {
            display: flex; align-items: center; gap: 0.75rem;
            margin-top: 2rem; padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--r-lg);
        }
        .sidebar-profile-name { font-weight: 700; font-size: 0.95rem; color: var(--text); }
        .sidebar-profile-handle { font-size: 0.8rem; color: var(--text2); }
        .main-content {
            flex: 1; padding: 1.5rem; display: flex; flex-direction: column;
            gap: 2rem; width: 100%; max-width: 800px; margin: 0 auto;
        }
        @media (min-width: 768px) { .main-content { padding: 0; max-width: 100%; } }

        .sb-av {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .9rem;
            font-weight: 800;
            color: #fff;
            flex-shrink: 0
        }

        .main {
            padding: 1.2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.8rem
        }
        
        @media(min-width: 768px) {
            .main {
                padding: 1.8rem;
            }
        }

        .sec-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: .9rem
        }

        .sec-title {
            font-size: 1.35rem;
            font-weight: 800;
            letter-spacing: -.5px
        }

        .sec-sub {
            font-size: .84rem;
            color: var(--text2);
            margin-top: .2rem
        }

        /* CARDS */
        .card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--r-xl);
            padding: 1.75rem;
            backdrop-filter: blur(24px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.25);
            transform: translateY(-2px);
        }

        .p-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.4rem
        }

        @media(min-width:640px) {
            .p-grid {
                grid-template-columns: 1fr 1fr
            }
        }

        .qr-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .9rem
        }

        .qr-box {
            background: #fff;
            border-radius: var(--r);
            padding: 10px;
            box-shadow: 0 6px 28px rgba(0, 0, 0, .4)
        }

        .qr-url {
            font-size: .76rem;
            color: var(--muted);
            word-break: break-all;
            text-align: center;
            background: rgba(255, 255, 255, .04);
            padding: .38rem .7rem;
            border-radius: var(--r-sm);
            border: 1px solid var(--border);
            width: 100%;
            display: flex;
            align-items: center;
            gap: .35rem
        }

        .stat-val {
            font-size: 1.7rem;
            font-weight: 900;
            background: var(--grad-t);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .stat-lbl {
            font-size: .74rem;
            color: var(--muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .05em
        }

        /* LINKS list */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: .7rem
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: .9rem;
            background: linear-gradient(rgba(var(--brand-rgb, var(--primary-rgb)), .02), rgba(var(--brand-rgb, var(--primary-rgb)), .02)), rgba(255, 255, 255, .01);
            border: 1px solid rgba(var(--brand-rgb, var(--primary-rgb)), .1);
            border-radius: var(--r);
            padding: .9rem 1.1rem;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .link-item:hover {
            border-color: rgba(var(--brand-rgb, var(--primary-rgb)), .35);
            background: linear-gradient(rgba(var(--brand-rgb, var(--primary-rgb)), .06), rgba(var(--brand-rgb, var(--primary-rgb)), .06)), rgba(255, 255, 255, .01);
            box-shadow: 0 4px 20px rgba(var(--brand-rgb, var(--primary-rgb)), .15);
            transform: translateY(-2px);
        }

        .li-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            flex-shrink: 0;
            background: rgba(var(--brand-rgb, var(--primary-rgb)), .12);
            border: 1px solid rgba(var(--brand-rgb, var(--primary-rgb)), .2);
        }

        .li-info {
            flex: 1;
            overflow: hidden
        }

        .li-title {
            font-weight: 700;
            font-size: .92rem
        }

        .li-url {
            font-size: .77rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px
        }

        .li-actions {
            display: flex;
            gap: .35rem;
            flex-shrink: 0
        }

        /* EMPTY */
        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2.8rem 2rem;
            gap: .7rem;
            color: var(--muted)
        }

            font-weight: 600;

            inset: 0;
            z-index: 500;
            background: rgba(0, 0, 0, .62);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn .2s ease
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .modal {
            background: #0e1326;
            border: 1px solid var(--border);
            border-radius: var(--r-xl);
            padding: 1.9rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, .6);
            animation: slideUp .3s ease;
            position: relative
        }

        .modal-hd {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.3rem
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 800
        }

        .modal-x {
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 1.4rem;
            line-height: 1;
            cursor: pointer;
            padding: .2rem;
            transition: var(--tr)
        }

        .modal-x:hover {
            color: var(--text)
        }

        .modal select.form-input {
            cursor: pointer
        }

        /* TOAST */
        .toast-wrap {
            position: fixed;
            bottom: 1.4rem;
            left: 1.4rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: .45rem
        }

        .toast {
            background: #1c2740;
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: .8rem 1.15rem;
            display: flex;
            align-items: center;
            gap: .55rem;
            font-size: .84rem;
            font-weight: 500;
            box-shadow: 0 6px 26px rgba(0, 0, 0, .4);
            animation: toastIn .3s ease;
            max-width: 300px
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-18px)
            }

            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        .toast.ok {
            border-color: rgba(16, 185, 129, .4)
        }

        .toast.er {
            border-color: rgba(239, 68, 68, .4)
        }

            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 4rem

        .pub-card {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.65rem
        }

        .badge-pill .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ok);
            margin-left: .2rem
        }

        .pub-avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: 900;
            color: #fff;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, .3), 0 0 38px rgba(124, 58, 237, .35);
            animation: glow 3s ease-in-out infinite alternate
        }

        @keyframes glow {
            0% {
                box-shadow: 0 0 0 4px rgba(var(--primary-rgb), .3), 0 0 28px rgba(var(--primary-rgb), .3)
            }

            100% {
                box-shadow: 0 0 0 6px rgba(59, 130, 246, .3), 0 0 55px rgba(59, 130, 246, .4)
            }
        }

        .pub-brand {
            font-size: 1.7rem;
            font-weight: 900;
            letter-spacing: -.4px;
            text-align: center
        }

        .pub-handle {
            font-size: .87rem;
            color: var(--muted);
            margin-top: .08rem
        }

        .pub-links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: .7rem
        }

        .pub-link {
            display: flex;
            align-items: center;
            gap: .95rem;
            background: linear-gradient(rgba(var(--brand-rgb, var(--primary-rgb)), .03), rgba(var(--brand-rgb, var(--primary-rgb)), .03)), var(--bg-card);
            border: 1px solid rgba(var(--brand-rgb, var(--primary-rgb)), .15);
            border-radius: var(--r);
            padding: .95rem 1.2rem;
            text-decoration: none;
            color: var(--text);
            transition: var(--tr);
            cursor: pointer;
            backdrop-filter: blur(14px)
        }

        .pub-link:hover {
            background: linear-gradient(rgba(var(--brand-rgb, var(--primary-rgb)), .12), rgba(var(--brand-rgb, var(--primary-rgb)), .12)), var(--bg-card);

            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(var(--brand-rgb, var(--primary-rgb)), .25);
        }

        .pub-link-icon {
            font-size: 1.35rem;
            width: 28px;
            text-align: center
        }

        /* FA icon colors */
        .fa-instagram {
            color: #e1306c
        }

        .fa-x-twitter {
            color: #f1f5f9
        }

        .fa-tiktok {
            color: #69c9d0
        }

        .fa-youtube {
            color: #ff0000
        }

        .fa-facebook {
            color: #1877f2
        }

        .fa-snapchat {
            color: #fffc00
        }

        .fa-whatsapp {
            color: #25d366
        }

        .fa-telegram {
            color: #26a5e4
        }

        .fa-globe {
            color: #60a5fa
        }

        .fa-envelope {
            color: #94a3b8
        }

        .fa-phone {
            color: #10b981
        }

        .fa-location-dot {
            color: #ea4335
        }

        .fa-link {
            color: var(--primary)
        }

        /* Brand Class Mapping Definitions */
        .pl-instagram   { --brand-color: #e1306c; --brand-rgb: 225, 48, 108; }
        .pl-twitter     { --brand-color: #1da1f2; --brand-rgb: 29, 161, 242; }
        .pl-tiktok      { --brand-color: #69c9d0; --brand-rgb: 105, 201, 208; }
        .pl-youtube     { --brand-color: #ff0000; --brand-rgb: 255, 0, 0; }
        .pl-facebook    { --brand-color: #1877f2; --brand-rgb: 24, 119, 242; }
        .pl-snapchat    { --brand-color: #fffc00; --brand-rgb: 255, 252, 0; }
        .pl-whatsapp    { --brand-color: #25d366; --brand-rgb: 37, 211, 102; }
        .pl-telegram    { --brand-color: #26a5e4; --brand-rgb: 38, 165, 228; }
        .pl-website     { --brand-color: #60a5fa; --brand-rgb: 96, 165, 250; }

        .pl-location    { --brand-color: #ea4335; --brand-rgb: 234, 67, 53; }

        }

        }

            flex-direction: column;
            align-items: center;
            gap: .7rem;

            left: 0;
            right: 0;

        }

            }

        }

            let h = hex.replace(/^#/, '');
            if (h.length === 3) h = h.split('').map(x => x + x).join('');
            if (h.length !== 6) return '124, 58, 237';
            return `${parseInt(h.substring(0, 2), 16)}, ${parseInt(h.substring(2, 4), 16)}, ${parseInt(h.substring(4, 6), 16)}`;

        function ensureHttp(u, icon = '') {
            if (!u) return u;
            const trimmed = u.trim();
            if (/^(https?|tel|mailto|sms):/i.test(trimmed)) return trimmed;
            if (icon === 'fa-solid fa-phone') {
                const clean = trimmed.replace(/[\s()-]/g, '');
                if (/^\+?\d+$/.test(clean)) return 'tel:' + clean;
            }
            if (icon === 'fa-solid fa-envelope') {
                if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmed)) return 'mailto:' + trimmed;
            }
            return 'https://' + trimmed;

        async function signup(email, password, brandName) {
            let slug = slugify(brandName);
            if (!email || !password || !brandName) return { ok: false, err: 'جميع الحقول مطلوبة.' };
            if (password.length < 6) return { ok: false, err: 'يجب أن تكون كلمة المرور 6 أحرف على الأقل.' };

            try {
                // Auto-resolve slug collision in Firestore
                let isTaken = true;
                while (isTaken) {
                    const snap = await db.collection("brands").where("slug", "==", slug).get();
                    if (snap.empty) {
                        isTaken = false;
                    } else {
                        slug += '-' + Math.floor(Math.random() * 10000);
                    }
                }

                const cred = await auth.createUserWithEmailAndPassword(email, password);
                const user = cred.user;

                // Save brand info to Firestore
                await db.collection("brands").add({
                    brandName,
                    slug,
                    email,
                    ownerId: user.uid,
                    created: Date.now()
                });

                // Save user info to Firestore
                await db.collection("users").doc(user.uid).set({
                    uid: user.uid,
                    email: email,
                    created: Date.now()
                });

                await user.sendEmailVerification();
                await auth.signOut();

                return { ok: false, err: t('verifyEmail') };
            } catch (e) {
                let msg = e.message;
                if (e.code === 'auth/email-already-in-use') msg = 'البريد الإلكتروني مستخدم بالفعل.';
                return { ok: false, err: msg };
            }
        }

        async function login(email, password) {
            if (!email || !password) return { ok: false, err: 'البريد الإلكتروني وكلمة المرور مطلوبان.' };
            try {
                const cred = await auth.signInWithEmailAndPassword(email, password);
                const user = cred.user;

                if (!user.emailVerified) {
                    await auth.signOut();
                    return { ok: false, err: t('emailNotVerified') };
                }

                // Fetch brand info from Firestore
                const brands = await getUserBrands(user.uid);
                if (brands.length === 0) return { ok: false, err: 'المستخدم غير موجود في قاعدة البيانات.' };

                const brandData = brands[0];
                const safe = { email: user.email, brandName: brandData.brandName, slug: brandData.slug, id: brandData.id, uid: user.uid, logoUrl: brandData.logoUrl, themeColor: brandData.themeColor || '#7c3aed', displayNameAr: brandData.displayNameAr, displayNameEn: brandData.displayNameEn };
                setUser(safe);
                applyTheme(safe.themeColor);
                return { ok: true, user: safe };
            } catch (e) {
                let msg = e.message;
                if (e.code === 'auth/invalid-credential') msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
                if (e.code === 'auth/user-not-found') msg = 'المستخدم غير موجود.';
                return { ok: false, err: msg };
            }
        }

        async function logout() {
            await auth.signOut();

        auth.onAuthStateChanged(async (user) => {
            if (user && user.emailVerified) {

                if (brands.length > 0) {
                    let me = getCurrentUser();
                    let brandData = brands.find(b => me && b.slug === me.slug) || brands[0];
                    const safe = { email: user.email, brandName: brandData.brandName, slug: brandData.slug, id: brandData.id, uid: user.uid, logoUrl: brandData.logoUrl, themeColor: brandData.themeColor || '#7c3aed', displayNameAr: brandData.displayNameAr, displayNameEn: brandData.displayNameEn };

        async function updateProfile(updates) {
            const me = getCurrentUser(); if (!me) return { ok: false, err: 'Not authenticated.' };
            try {
                const brandId = me.id || me.uid;
                const brandRef = db.collection("brands").doc(brandId);
                if (updates.brandName) {
                    const ns = slugify(updates.brandName);
                    // Check slug uniqueness (excluding current brand)
                    const snap = await db.collection("brands").where("slug", "==", ns).get();
                    if (!snap.empty && snap.docs[0].id !== brandId) return { ok: false, err: 'اسم العلامة التجارية مستخدم بالفعل.' };

                    updates.slug = ns;
                }

                await brandRef.update(updates);
                const d = await brandRef.get();
                const stored = d.data();
                const safe = { email: me.email, brandName: stored.brandName, slug: stored.slug, id: brandId, uid: me.uid, logoUrl: stored.logoUrl, themeColor: stored.themeColor || '#7c3aed' };
                setUser(safe);
                return { ok: true, user: safe };
            } catch (e) {
                return { ok: false, err: e.message };
            }
        }

        async function getUserBrands(uid) {
            try {
                const snap = await db.collection("brands").where("ownerId", "==", uid).get();
                let brands = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                if (brands.length === 0) {
                    const oldReq = await db.collection("brands").doc(uid).get();
                    if (oldReq.exists) { brands = [{ id: oldReq.id, ...oldReq.data() }]; }
                }
                return brands;
            } catch (e) {
                console.error("Error fetching user brands:", e);
                return [];
            }
        }

        async function getLinks(slug) {
            try {
                const snap = await db.collection("links").where("slug", "==", slug).get();
                return snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => {
                    const oA = typeof a.order === 'number' ? a.order : -a.created;
                    const oB = typeof b.order === 'number' ? b.order : -b.created;
                    return oA - oB;
                });
            } catch (e) {
                console.error("Error fetching links:", e);
                return [];
            }
        }

        function getHash() { return window.location.hash.slice(1) || '/'; }
        async function resolveRoute() {
            const h = getHash();
            for (const r of _routes) {
                if (typeof r.path === 'string' && r.path === h) { await r.fn({}); return; }
                if (r.path instanceof RegExp) { const m = h.match(r.path); if (m) { await r.fn(m); return; } }
            }
            if (_notFound) await _notFound(h);
        }

        // ============================================================

        async function renderDashboard(sec) {

                const l = getLang(), links = await getLinks(me.slug), pUrl = publicUrl(me.slug);

                document.getElementById('app').innerHTML = `
<div class="bg-orbs" style="opacity:.45"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="page">
  <nav class="nav">
    <div class="nav-brand" id="dl">🔗 LinkBrand</div>

      </div>
      <div id="desk-b-switcher" style="margin-bottom: 1.5rem;"></div>

      ${['overview', 'links', 'qr', 'profile'].map(s => `
        <div class="sidebar-link${active === s ? ' active' : ''}" data-s="${s}">

        </div>`).join('')}

      <div class="sidebar-profile">
          ${renderAvatar(me, 'sb-av')}
          <div style="overflow:hidden">
              <div class="sidebar-profile-name">${me.brandName}</div>
              <div class="sidebar-profile-handle">/${me.slug}</div>
          </div>
      </div>
    </aside>

    <main class="main-content" id="dm">${drawSection(active, links, pUrl, me)}</main>

    <!-- Mobile Bottom Navigation -->
    <nav class="bottom-nav">
      ${['overview', 'links', 'qr', 'profile'].map(s => `
        <div class="bn-item${active === s ? ' active' : ''}" data-s="${s}">
          <span class="ic">${s === 'overview' ? '📊' : s === 'links' ? '🔗' : s === 'qr' ? '📱' : '👤'}</span> ${t(s)}
        </div>`).join('')}
    </nav>
  </div>
</div>`;
                bindDash(links, pUrl, userBrands, me);
            }
            function drawSection(s, links, pUrl, me) {
                if (s === 'overview') return secOverview(links, pUrl, me);
                if (s === 'links') return secLinks(links);
                if (s === 'qr') return secQR(pUrl);
                if (s === 'profile') return secProfile(me);
                return secOverview(links, pUrl, me);
            }
            function bindDash(links, pUrl, userBrands, me) {
                q('#dl').onclick = () => navigate('/');
                q('#lang-toggle').onclick = () => setLang(getLang() === 'ar' ? 'en' : 'ar');
                if (q('#dadmin')) q('#dadmin').onclick = () => navigate('/admin');
                q('#dvp').onclick = () => window.open(pUrl, '_blank');
                q('#dlo').onclick = async () => { await logout(); toast(t('deleted').replace('الرابط', 'الجلسة'), 'info'); navigate('/'); };
                qAll('.sidebar-link[data-s], .bn-item[data-s]').forEach(l => l.addEventListener('click', () => { active = l.dataset.s; draw(); }));

                // Brand Switcher
                const brandOptions = userBrands.map(b => ({ value: b.id || b.uid, label: b.brandName, icon: '' }));
                const currentId = me.id || me.uid;
                
                const onBrandSwitch = async (val) => {
                    if (val !== currentId) {
                        const selBrand = userBrands.find(b => (b.id || b.uid) === val);
                        if (selBrand) {
                            const safe = { email: me.email, brandName: selBrand.brandName, slug: selBrand.slug, id: selBrand.id || selBrand.uid, uid: me.uid, logoUrl: selBrand.logoUrl, themeColor: selBrand.themeColor || '#7c3aed' };
                            setUser(safe);
                            applyTheme(safe.themeColor);
                            renderDashboard(active);
                        }
                    }
                };

                setupCustomSelect('desk-b-switcher', brandOptions, currentId, onBrandSwitch);
                setupCustomSelect('mob-b-switcher', brandOptions, currentId, onBrandSwitch);

                // New Brand Modal
                qAll('.b-new-brand-btn').forEach(btn => btn.addEventListener('click', () => {
                    openModal('➕ Create New Brand', body => {
                        body.innerHTML = `
                            <div id="nb-alert"></div>
                            <div class="form-group"><label class="form-label">${t('brandName')}</label><input class="form-input" id="nb-name" type="text" placeholder="${t('brandPlaceholder')}" maxlength="40"/>
                                <div class="form-helper" id="nb-sp">${t('slugHint')}</div></div>
                            <button class="btn btn-p btn-full" id="nb-sub">${t('createBtn')}</button>

                        const bInput = body.querySelector('#nb-name'), sp = body.querySelector('#nb-sp');
                        if (bInput && sp) bInput.addEventListener('input', () => {
                            const s = slugify(bInput.value);
                            sp.innerHTML = s ? `${t('slugHint').split(' /')[0]} <strong style="color:#a78bfa">/${s}</strong>` : t('slugHint');
                        });
                        body.querySelector('#nb-sub').onclick = async () => {
                            const name = bInput.value.trim();
                            const slug = slugify(name);
                            if (!name) { body.querySelector('#nb-alert').innerHTML = `<div class="alert alert-e">❌ ${t('fieldsRequired')}</div>`; return; }

                            const btn = body.querySelector('#nb-sub');
                            btn.disabled = true; btn.innerText = t('loading');

                            try {
                                const snap = await db.collection("brands").where("slug", "==", slug).get();
                                if (!snap.empty) { throw new Error(t('slugTaken')); }

                                const newBrand = { brandName: name, slug, email: me.email, ownerId: me.uid, created: Date.now() };
                                const docRef = await db.collection("brands").add(newBrand);

                                const safe = { email: me.email, brandName: name, slug, id: docRef.id, uid: me.uid, themeColor: '#7c3aed' };
                                setUser(safe);
                                applyTheme('#7c3aed');
                                closeModal();
                                toast(t('brandPageCreated') + '! 🎉', 'ok');
                                renderDashboard('overview');
                            } catch (err) {
                                body.querySelector('#nb-alert').innerHTML = `<div class="alert alert-e">❌ ${err.message}</div>`;
                                btn.disabled = false; btn.innerText = t('createBtn');
                            }
                        };
                    });
                }));
                if (active === 'overview') {
                    q('#ocopy')?.addEventListener('click', () => { navigator.clipboard.writeText(pUrl).then(() => toast(t('linkCopied'))); });
                    q('#ogo')?.addEventListener('click', () => { active = 'links'; draw(); });
                    makeQR('oqr', pUrl, 138);
                }
                if (active === 'links') {
                    q('#badd').onclick = () => openAddModal(me.slug, async () => await draw());
                    qAll('.bedit').forEach(b => b.addEventListener('click', () => openEditModal(links.find(l => l.id === b.dataset.id), async () => await draw())));
                    qAll('.bdel').forEach(b => b.addEventListener('click', async () => {
                        if (confirm(t('confirmDelete'))) {
                            await deleteLink(b.dataset.id);
                            toast(t('deleted'), 'warn');
                            await draw();
                        }
                    }));

                    const list = q('.links-list');
                    if (list) {
                        let draggedItem = null;
                        list.addEventListener('dragstart', e => {
                            draggedItem = e.target.closest('.link-item');
                            if (draggedItem) {
                                setTimeout(() => draggedItem.style.opacity = '0.4', 0);
                            }
                        });
                        list.addEventListener('dragend', e => {
                            if (draggedItem) draggedItem.style.opacity = '1';
                            draggedItem = null;
                        });
                        list.addEventListener('dragover', e => {
                            e.preventDefault();
                            const dest = e.target.closest('.link-item');
                            if (dest && dest !== draggedItem && draggedItem) {
                                const rect = dest.getBoundingClientRect();
                                const next = (e.clientY - rect.top) / (rect.bottom - rect.top) > 0.5;
                                list.insertBefore(draggedItem, next ? dest.nextSibling : dest);
                            }
                        });
                        list.addEventListener('drop', async e => {
                            e.preventDefault();
                            if (!draggedItem) return;
                            if (draggedItem) draggedItem.style.opacity = '1';
                            const items = Array.from(list.querySelectorAll('.link-item'));
                            try {
                                const batch = db.batch();
                                items.forEach((item, index) => {
                                    const linkRef = db.collection("links").doc(item.dataset.id);
                                    batch.update(linkRef, { order: index });
                                });
                                await batch.commit();
                                toast(t('updated'));
                            } catch (err) { }
                        });
                    }
                }
                if (active === 'qr') {
                    makeQR('qrmain', pUrl, 200);
                    q('#qdl').onclick = () => { const c = document.querySelector('#qrmain canvas'); if (c) { const a = document.createElement('a'); a.href = c.toDataURL('image/png'); a.download = 'qr-code.png'; a.click(); toast(`${t('updates').split('!')[0]} QR! 📥`); } else toast(t('error')); };
                    q('#qcopy').onclick = () => { navigator.clipboard.writeText(pUrl).then(() => toast(t('linkCopied'))); };
                }
                if (active === 'profile') {
                    const fileIn = q('#plogo-file');
                    const colorIn = q('#ptheme');
                    const preview = q('#plogo-preview');
                    let currentBase64 = me.logoUrl || '';

                    fileIn?.addEventListener('change', (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const img = new Image();
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                const MAX_SIZE = 256;
                                let w = img.width, h = img.height;
                                if (w > h) { if (w > MAX_SIZE) { h *= MAX_SIZE / w; w = MAX_SIZE; } }
                                else { if (h > MAX_SIZE) { w *= MAX_SIZE / h; h = MAX_SIZE; } }
                                canvas.width = w; canvas.height = h;
                                const ctx = canvas.getContext('2d');
                                ctx.drawImage(img, 0, 0, w, h);
                                currentBase64 = canvas.toDataURL('image/webp', 0.8);
                                preview.innerHTML = `<img src="${currentBase64}" style="width:100%;height:100%;object-fit:cover;border-radius:var(--r-sm)" />`;
                            };
                            img.src = ev.target.result;
                        };
                        reader.readAsDataURL(file);
                    });

                    q('#psave').addEventListener('click', async () => {

                        const tc = colorIn?.value || '#7c3aed';
                        if (!bn) { toast(t('fieldsRequired'), 'er'); return; }

                        const btn = q('#psave');
                        const origText = btn.innerText;
                        btn.innerText = t('loading');
                        btn.disabled = true;

                        const r = await updateProfile({ brandName: bn, displayNameAr: dnAr, displayNameEn: dnEn, logoUrl: currentBase64, themeColor: tc });

                        btn.innerText = origText;
                        btn.disabled = false;

                        if (r.ok) {
                            applyTheme(tc);
                            toast(`${t('updated')} ✨`);
                            draw();
                        }
                        else toast(r.err, 'er');
                    });
                }
            }
            function openAddModal(slug, onComplete) {
                openModal(`➕ ${t('addLink')}`, body => {
                    body.innerHTML = linkForm(null);
                    wireForm(body, null, onComplete);
                });
            }
            function openEditModal(lnk, onComplete) {
                if (!lnk) return;
                openModal(`✏️ ${t('editLink')}`, body => {
                    body.innerHTML = linkForm(lnk);
                    wireForm(body, lnk, onComplete);
                });
            }
            function linkForm(lnk) {
                return `<div id="lfa"></div>
<div class="form-group"><label class="form-label">${t('linkTitle')}</label><input class="form-input" id="lft" placeholder="${t('brandPlaceholder')}" value="${lnk ? lnk.title : ''}" maxlength="50"/></div>
<div class="form-group"><label class="form-label">${t('linkIcon')}</label><div id="custom-icon-select"></div><input type="hidden" id="lfi" value="${lnk ? lnk.icon : PLATFORMS[0].icon}"/></div>
<div class="form-group"><label class="form-label">${t('linkUrl')}</label><input class="form-input" id="lfu" placeholder="https://…" value="${lnk ? lnk.url : ''}"/></div>
<div style="display:flex;gap:.7rem;justify-content:flex-end;margin-top:1rem">
  <button class="btn btn-g" id="lfcan">${t('cancel')}</button>
  <button class="btn btn-p" id="lfsav">${lnk ? t('saveChanges') : t('addLink')}</button>
</div>`;
            }
            function wireForm(body, lnk, onComplete) {
                body.querySelector('#lfcan').onclick = closeModal;
                const uEl = body.querySelector('#lfu'), iHidden = body.querySelector('#lfi');

                function applyPlatformPrefix(uEl, selectedIcon) {
                    const val = uEl.value.trim();
                    const plat = PLATFORMS.find(p => p.icon === selectedIcon);
                    if (!plat) return;

                    function isExistingUrl(str) {
                        return /^(https?:\/\/|mailto:|tel:)/i.test(str) || str.includes('.');
                    }

                    function getPlatformOfUrl(str) {
                        const s = str.toLowerCase();
                        if (s.startsWith('tel:')) return PLATFORMS.find(p => p.key === 'phone');
                        if (s.startsWith('mailto:')) return PLATFORMS.find(p => p.key === 'emailLink');
                        if (s.includes('whatsapp.com')) return PLATFORMS.find(p => p.key === 'whatsapp');
                        if (s.includes('google.com/maps') || s.includes('maps.google.com') || s.includes('maps.app')) return PLATFORMS.find(p => p.key === 'location');
                        for (const p of PLATFORMS) {
                            if (p.d && s.includes(p.d)) return p;
                        }
                        return null;
                    }

                    const currentPlat = getPlatformOfUrl(val);
                    const isCustomUrl = !currentPlat && isExistingUrl(val);

                    let handle = val;
                    if (currentPlat) {
                        if (currentPlat.key === 'phone') {
                            handle = val.substring(4);
                        } else if (currentPlat.key === 'emailLink') {
                            handle = val.substring(7);
                        } else if (currentPlat.d) {
                            let dom = currentPlat.d;
                            if (currentPlat.key === 'whatsapp' && val.includes('whatsapp.com')) {
                                dom = 'whatsapp.com';
                            } else if (currentPlat.key === 'location') {
                                if (val.includes('maps.google.com')) dom = 'maps.google.com';
                                else if (val.includes('maps.app')) dom = 'maps.app';
                                else dom = 'google.com/maps';
                            }
                            const idx = val.toLowerCase().indexOf(dom) + dom.length;
                            handle = val.substring(idx);
                        }
                        handle = handle.replace(/^[/\s@]+/, '');
                    } else if (isCustomUrl) {
                        handle = '';
                    } else {
                        handle = handle.replace(/^[/\s@]+/, '');
                    }

                    if (plat.key === 'phone') {
                        const clean = handle.replace(/[^\d+]/g, '');
                        uEl.value = 'tel:' + clean;
                    } else if (plat.key === 'emailLink') {
                        uEl.value = 'mailto:' + handle;
                    } else if (plat.d) {
                        uEl.value = `https://${plat.d}/${handle}`;
                    } else {
                        if (isCustomUrl) {
                            uEl.value = val;
                        } else if (handle) {
                            uEl.value = handle.startsWith('http') ? handle : 'https://' + handle;
                        } else {
                            uEl.value = '';
                        }
                    }
                }

                // Initialize Custom Select
                setupCustomSelect('custom-icon-select', PLATFORMS.map(p => ({ label: t('platforms.' + p.key), value: p.icon, icon: p.icon })), iHidden.value, (val) => {
                    iHidden.value = val;
                    applyPlatformPrefix(uEl, val);
                });

                uEl.addEventListener('blur', () => {
                    const g = guessIcon(uEl.value);
                    if (g !== 'fa-solid fa-link') {
                        iHidden.value = g;
                        setupCustomSelect('custom-icon-select', PLATFORMS.map(p => ({ label: t('platforms.' + p.key), value: p.icon, icon: p.icon })), g, (val) => {
                            iHidden.value = val;
                            applyPlatformPrefix(uEl, val);
                        });
                    }
                });

                body.querySelector('#lfsav').onclick = async () => {
                    const title = body.querySelector('#lft').value.trim(), url = body.querySelector('#lfu').value.trim(), icon = iHidden.value;
                    const al = body.querySelector('#lfa');
                    if (!title || !url) { al.innerHTML = `<div class="alert alert-e">❌ ${t('fieldsRequired')}</div>`; return; }
                    if (lnk) {
                        await updateLink(lnk.id, { title, url, icon });
                        toast(`${t('updated')} ✅`);
                    } else {
                        await addLink({ title, url, icon, slug: me.slug, ownerId: me.uid });
                        toast(`${t('updated')} 🎉`);
                    }
                    closeModal();
                    if (onComplete) await onComplete();
                };
            }
            draw();
        }
